name: Deploy

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      target:
        description: Deployment target
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
          - both
      ref:
        description: Git ref to deploy (branch/tag/SHA)
        required: false
        default: main
        type: string

permissions:
  contents: read

jobs:
  deploy_staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'staging' || github.event.inputs.target == 'both'))
    env:
      NODE_ENV: production
      CI_PRODUCTION: true
      VITE_APP_ID: ${{ vars.VITE_APP_ID }}
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
      VITE_WHATSAPP_NUMBER: ${{ vars.VITE_WHATSAPP_NUMBER }}
      VITE_UPLOAD_ENDPOINT: ${{ vars.VITE_UPLOAD_ENDPOINT }}
      VITE_DATA_MODE: live
      VITE_ALLOW_MOCK_FALLBACK: false
      VITE_MONITORING_ENDPOINT: ${{ vars.VITE_MONITORING_ENDPOINT }}
      VITE_MONITORING_API_KEY: ${{ secrets.VITE_MONITORING_API_KEY }}
      VITE_RELEASE_VERSION: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Check Required Variables
        run: |
          if [ -z "${VITE_APP_ID}" ]; then echo "::error::Missing Actions variable VITE_APP_ID"; exit 1; fi
          if [ -z "${VITE_API_BASE_URL}" ]; then echo "::error::Missing Actions variable VITE_API_BASE_URL"; exit 1; fi
          if [ -z "${VITE_WHATSAPP_NUMBER}" ]; then echo "::error::Missing Actions variable VITE_WHATSAPP_NUMBER"; exit 1; fi
          if [ -z "${VITE_MONITORING_ENDPOINT}" ]; then echo "::error::Missing Actions variable VITE_MONITORING_ENDPOINT"; exit 1; fi

      - name: Validate Env
        run: npm run validate:env

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Install Playwright Browser
        run: npx playwright install --with-deps chromium

      - name: E2E Gate
        run: npm run test:e2e

      - name: Trigger Staging Deploy Hook
        env:
          DEPLOY_HOOK_URL: ${{ secrets.DEPLOY_HOOK_URL }}
          DEPLOY_HOOK_URL_STAGING: ${{ secrets.DEPLOY_HOOK_URL_STAGING }}
        run: |
          HOOK_URL="${DEPLOY_HOOK_URL_STAGING:-$DEPLOY_HOOK_URL}"
          if [ -z "$HOOK_URL" ]; then
            echo "::error::Missing Actions secret DEPLOY_HOOK_URL (or DEPLOY_HOOK_URL_STAGING)."
            exit 1
          fi
          curl -fsS -X POST "$HOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"environment\":\"staging\",\"sha\":\"${GITHUB_SHA}\"}"

  deploy_production:
    name: Deploy Production
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'production' || github.event.inputs.target == 'both'))
    env:
      NODE_ENV: production
      CI_PRODUCTION: true
      VITE_APP_ID: ${{ vars.VITE_APP_ID }}
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
      VITE_WHATSAPP_NUMBER: ${{ vars.VITE_WHATSAPP_NUMBER }}
      VITE_UPLOAD_ENDPOINT: ${{ vars.VITE_UPLOAD_ENDPOINT }}
      VITE_DATA_MODE: live
      VITE_ALLOW_MOCK_FALLBACK: false
      VITE_MONITORING_ENDPOINT: ${{ vars.VITE_MONITORING_ENDPOINT }}
      VITE_MONITORING_API_KEY: ${{ secrets.VITE_MONITORING_API_KEY }}
      VITE_RELEASE_VERSION: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Check Required Variables
        run: |
          if [ -z "${VITE_APP_ID}" ]; then echo "::error::Missing Actions variable VITE_APP_ID"; exit 1; fi
          if [ -z "${VITE_API_BASE_URL}" ]; then echo "::error::Missing Actions variable VITE_API_BASE_URL"; exit 1; fi
          if [ -z "${VITE_WHATSAPP_NUMBER}" ]; then echo "::error::Missing Actions variable VITE_WHATSAPP_NUMBER"; exit 1; fi
          if [ -z "${VITE_MONITORING_ENDPOINT}" ]; then echo "::error::Missing Actions variable VITE_MONITORING_ENDPOINT"; exit 1; fi

      - name: Validate Env
        run: npm run validate:env

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Install Playwright Browser
        run: npx playwright install --with-deps chromium

      - name: E2E Gate
        run: npm run test:e2e

      - name: Trigger Production Deploy Hook
        env:
          DEPLOY_HOOK_URL: ${{ secrets.DEPLOY_HOOK_URL }}
          DEPLOY_HOOK_URL_PRODUCTION: ${{ secrets.DEPLOY_HOOK_URL_PRODUCTION }}
        run: |
          HOOK_URL="${DEPLOY_HOOK_URL_PRODUCTION:-$DEPLOY_HOOK_URL}"
          if [ -z "$HOOK_URL" ]; then
            echo "::error::Missing Actions secret DEPLOY_HOOK_URL (or DEPLOY_HOOK_URL_PRODUCTION)."
            exit 1
          fi
          curl -fsS -X POST "$HOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"environment\":\"production\",\"sha\":\"${GITHUB_SHA}\",\"ref\":\"${GITHUB_REF}\"}"
