name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Typecheck and Build
    runs-on: ubuntu-latest
    env:
      VITE_APP_ID: ci-app
      VITE_API_BASE_URL: http://localhost:3000
      VITE_WHATSAPP_NUMBER: 919876543210
      VITE_DATA_MODE: mock
      VITE_ALLOW_MOCK_FALLBACK: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Validate Env
        run: npm run validate:env

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  e2e:
    name: E2E Gate
    runs-on: ubuntu-latest
    env:
      VITE_APP_ID: ci-app
      VITE_API_BASE_URL: http://localhost:3000
      VITE_WHATSAPP_NUMBER: 919876543210
      VITE_DATA_MODE: mock
      VITE_ALLOW_MOCK_FALLBACK: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Install Playwright Browser
        run: npx playwright install --with-deps chromium

      - name: Run E2E
        run: npm run test:e2e
